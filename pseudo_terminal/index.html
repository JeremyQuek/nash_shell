<!doctype html>
<html>
    <head>
        <style>
            body {
                background: black;
                color: #0f0;
                font-family: "Courier New", monospace;
                margin: 0;
                overflow: hidden;
            }
            #matrix-canvas {
                position: fixed;
                top: 0;
                left: 0;
                z-index: -1;
                opacity: 0.8;
            }

            #terminal {
                height: 100vh;
                display: flex;
                flex-direction: column;
                padding: 20px;
                box-sizing: border-box;
                font-weight: bold;
            }

            #history {
                flex-grow: 1;
                overflow-y: auto;
                margin-bottom: 10px;
                white-space: normal;
                word-break: break-all;
            }

            /* The Hidden Input Container */
            .input-line {
                display: flex;
                align-items: center;
                opacity: 0; /* Keep it functional but invisible */
                position: absolute;
                left: -9999px;
            }

            .loading-box {
                display: inline-block;
                width: 10px;
                height: 1.2em;
                background-color: #0f0;
                margin-left: 2px;
                animation: blink 0.8s infinite;
                vertical-align: middle;
            }

            @keyframes blink {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0;
                }
            }

            #history::-webkit-scrollbar {
                width: 5px;
            }
            #history::-webkit-scrollbar-thumb {
                background: #050;
            }
        </style>
    </head>
    <body>
        <canvas id="matrix-canvas"></canvas>
        <div id="terminal">
            <div id="history">
                <div>< NASH UPLINK ESTABLISHED ></div>
                <div id="welcome-msg">WAKING UP...</div>
            </div>
            <div class="input-line">
                <input type="text" id="user-in" autofocus />
            </div>
        </div>

        <script>
            const history = document.getElementById("history");
            const input = document.getElementById("user-in");

            // --- HELPER: Create the "Waiting" Prompt ---
            function createActivePrompt(isShell = false) {
                // 1. Check for existing prompts to avoid duplicates
                if (document.getElementById("active-cursor")) return;

                const line = document.createElement("div");
                line.className = "prompt-line";

                if (isShell) {
                    // Shell/System is "thinking" - No prompt character, just the block
                    line.innerHTML =
                        '<span id="mirror-text"></span><span class="loading-box" id="active-cursor"></span>';
                } else {
                    // Standard User Input - Includes the ">" and the mirror span for typing
                    line.innerHTML =
                        '> <span id="mirror-text"></span><span class="loading-box" id="active-cursor"></span>';
                }

                history.appendChild(line);
                history.scrollTop = history.scrollHeight;
            }

            // --- MIRROR LOGIC: Show typing in real-time ---
            input.addEventListener("input", () => {
                const mirror = document.getElementById("mirror-text");
                if (mirror) {
                    mirror.textContent = input.value;
                    history.scrollTop = history.scrollHeight;
                }
            });

            // Keep focus on the hidden input at all times
            window.addEventListener("click", () => input.focus());

            // 1. Username Sync
            window.electronAPI.onSetUsername((name) => {
                const welcome = document.getElementById("welcome-msg");
                if (welcome) {
                    welcome.textContent = `WAKE UP....${name}`;
                }
                createActivePrompt();
            });

            // 2. Clear Screen
            window.electronAPI.onClear(() => {
                history.innerHTML = "<div>< NASH UPLINK ESTABLISHED ></div>";
                input.disabled = false;
                input.value = "";
                createActivePrompt();
                input.focus();
            });

            // --- 3. Handle Process Output (From C Binary) ---
            window.electronAPI.onOutput((data) => {
                // 1. Remove any temporary "waiting" cursor before posting real output
                const activeCursor = document.getElementById("active-cursor");
                if (activeCursor) {
                    activeCursor.parentElement.remove();
                }

                const line = document.createElement("div");
                line.textContent = data.trim();
                history.appendChild(line);

                // 2. Now create the actual interactive prompt for the next command
                createActivePrompt();

                input.disabled = false;
                input.focus();
                history.scrollTop = history.scrollHeight;
            });

            // --- 4. Handle User Input (Enter Key) ---
            input.addEventListener("keydown", (e) => {
                if (e.key === "Enter") {
                    const cmd = input.value;

                    // Clean up current prompt (solidify text, remove cursor)
                    const mirror = document.getElementById("mirror-text");
                    const cursor = document.getElementById("active-cursor");

                    if (mirror) {
                        mirror.removeAttribute("id");
                        if (cursor) cursor.remove();
                    }

                    if (cmd.trim() !== "") {
                        // input.disabled = true;
                        window.electronAPI.sendInput(cmd);

                        // --- THE ADDITION ---
                        // Create a "dummy" prompt line so the cursor blinks while waiting
                        createActivePrompt(true);
                    } else {
                        createActivePrompt();
                    }

                    input.value = "";
                }
            });

            // --- Matrix Rain Effect ---
            const canvas = document.getElementById("matrix-canvas");
            const ctx = canvas.getContext("2d");

            function initCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener("resize", initCanvas);
            initCanvas();

            const letters = "ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃ1234567890".split("");
            const fontSize = 16;
            const columns = canvas.width / fontSize;
            const drops = Array(Math.floor(columns)).fill(1);

            function drawRain() {
                ctx.fillStyle = "rgba(0, 0, 0, 0.08)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.font = fontSize + "px arial";

                drops.forEach((y, i) => {
                    const text =
                        letters[Math.floor(Math.random() * letters.length)];
                    ctx.fillStyle = "#38E057";
                    ctx.fillText(text, i * fontSize, y * fontSize);

                    if (y * fontSize > canvas.height && Math.random() > 0.975) {
                        drops[i] = 0;
                    }
                    drops[i]++;
                });
            }
            setInterval(drawRain, 33);

            // Initial prompt startup
            createActivePrompt();
        </script>
    </body>
</html>
